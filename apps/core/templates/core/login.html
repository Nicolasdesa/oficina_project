<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Oficina Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1F3864 0%, #2E75B6 60%, #1a2e50 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: #fff;
      border-radius: 18px;
      padding: 2.5rem 2rem;
      width: 100%; max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .brand-icon {
      width: 64px; height: 64px;
      background: #1F3864; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    .brand-icon i { font-size: 2rem; color: #ED7D31; }
    .btn-login {
      background: #ED7D31; border: none; color: #fff;
      font-weight: 600; padding: .75rem;
      border-radius: 10px; font-size: 1rem;
    }
    .btn-login:hover { background: #c9621a; color: #fff; }
    .form-control:focus { border-color: #2E75B6; box-shadow: 0 0 0 .2rem rgba(46,117,182,.2); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand-icon"><i class="bi bi-wrench-adjustable-circle-fill"></i></div>
    <h4 class="text-center fw-bold mb-1" style="color:#1F3864">Oficina Pro</h4>
    <p class="text-center text-muted small mb-4">Sistema de Gestão de Oficina</p>

    {% if form.errors %}
    <div class="alert alert-danger alert-sm py-2 small">
      <i class="bi bi-exclamation-triangle me-1"></i>
      Usuário ou senha incorretos.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Usuário</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="seu.usuario" autofocus required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="btn btn-login w-100">
        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
      </button>
    </form>
  </div>
</body>
</html>
